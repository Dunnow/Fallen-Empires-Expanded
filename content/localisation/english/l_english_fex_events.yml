l_english:
 fex_flavour.10.title: "Anachronistic Aliens"
 fex_flavour.10.desc: "The pre-FTL civilization on [From.GetName] appears to possess far more sophisticated technology than a species of their level should have.\n\nAdditionally, our scans do not detect any signs of major urban settlements across the world, only minor outposts. It is not clear how they could have developed such advanced technology.\n\nThey appear to be aware of our presence and are attempting to communicate with us."
 fex_flavour.10.a: "On screens."

 fex_flavour.11.desc: "[This.species.GetNamePlural]. This is our world. Leave us undisturbed and we shall do the same."
 fex_flavour.11.a: "Who are you?"
 fex_flavour.11.a.response: "We are ancient. Our forefathers came to this world long before yours had raised themselves from the muck. Here we may pursue our paths in peace."
 fex_flavour.11.b: "How do you have such advanced technology?"
 fex_flavour.11.b.response: "We developed it of course."
 fex_flavour.11.c: "What do you want from us?"
 fex_flavour.11.c.response: "Nothing. [FromFrom.GetName] is our home. It provides for all our wants. Leave our world untouched and you may do as you please with the resources of this system."
 fex_flavour.11.d: "End transmission."

 fex_flavour.13.desc: "Insolent [This.GetSpeciesNamePluralInsult]. How dare you sully this world's sanctity and assault our cousins? Withdraw immediately or face our wrath."
 fex_flavour.13.a: "We will withdraw immediately."
 fex_flavour.13.a.tooltip: "Our colony on [event_target:fex_invaded_exodite_planet.GetName] will be abandoned."
 fex_flavour.13.b: "We will not take orders from you."
 fex_flavour.13.b.tooltip: "§H[event_target:fex_xenophile_fe.GetName]§! will be very angry, and are likely to attack us."

 # Note, try to write references to the FEs in a way that doesn't break the text too badly if there's no event target.
 fex_flavour.30.title: "A Spectacular Find"
 fex_flavour.30.desc: "Our dig team on [This.GetName] have been successful beyond anyone's wildest dreams. The burial chamber is extraordinarily well preserved.\n\nIt appears that our team may be the first sentients to enter the tomb since it was sealed. The sheer volume of artifacts found within has exciting implications for our understanding of the period of [event_target:fex_burial_origin_country.GetAdj] history that they originate from."
 fex_flavour.30.a: "Wonderful."

 fex_flavour.31.title: "[This.GetName] Excavations"
 fex_flavour.31.desc: "Our archaeological team on [This.GetName] reports good news. Their efforts to excavate an ancient [event_target:fex_burial_origin_country.GetAdj] tomb has been successful.\n\nAlthough some of the outer chambers have been damaged by raiders or the passage of time, the inner chambers are largely intact and contain many of their original contents.\n\nThe treasures and technology held within are of great interest to the [this.owner.GetAdj] scientific community."
 fex_flavour.31.a: "Excellent."

 fex_flavour.32.title: "Digsite Blues"
 fex_flavour.32.desc: "We have successfully managed to excavate the burial complex on [This.GetName]. Unfortunately it appears that our team is not the first to do so.\n\nPirates, raiders or perhaps the descendants of those buried inside seem to have forced their way into the tomb and recovered many of the treasures held within.\n\nThe tomb itself is still of great interest to our scientists and we have been able to salvage some artifacts, but the bulk of the burial goods appear to be gone for good."
 fex_flavour.32.a: "Unfortunate."

 fex_flavour.33.title: "Fruitless Endeavours"
 fex_flavour.33.desc: "We do not seem to be the first to have explored the tombs of [This.GetName]. The complex bears the marks of having been entered several times, centuries apart. The treasure rooms and burial chambers have been meticulously picked clean.\n\nAlthough we can develop our understanding of the [event_target:fex_burial_origin_country.GetAdj] culture that buried their dead here by examining the markings of the tomb, we have missed out on obtaining any of the artifacts that may have once been buried here."
 fex_flavour.33.a: "Disappointing."

 fex_flavour.41.title: "Voidspawn Incursion"
 fex_flavour.41.desc: "Sensor readings report that hostile entities have emerged from the Shroud Rift in [event_target:fex_shroud_tear_system.GetName]!\n\nThey appear to be drawn to the high concentrations of Zro on several worlds in the system and are indiscriminately attacking all vessels in the area."
 fex_flavour.41.a: "$BATTLESTATIONS$"

 fex_flavour.42.title: "Unwelcome Visitors"
 fex_flavour.42.desc: "The [event_target:fex_shroud_tear_system.GetName] system has come under attack by some sort of extradimensional entities that emerged from the system's rift.\n\nAlthough the entities have been dispelled, some spacetime anomalies and odd sensor readings remain.\n\nWe have an opportunity to investigate further and learn more about these creatures."
 fex_flavour.42.a: "Make it so."

 fex_flavour.43.title: "Peeking Beyond the Veil"
 fex_flavour.43.desc: "The malevolent shroud entities encountered in [event_target:fex_shroud_tear_system.GetName] appear to be the latest in a long line of incursions. As far as our scientists can tell, periodic manifestations have been occurring since the formation of the Shroud Rift.\n\nIt seems that the entities are attracted by the substantial quantities of Zro deposited on various worlds across the system by the Rift.\n\nIf we could seal the Rift, we would stop the entities' incursions, but the replenishment of the Zro on the worlds of the system would cease and production would diminish."
 fex_flavour.43.a: "Fascinating."

 fex_flavour.44.title: "Sealing the Rift"
 fex_flavour.44.desc: "After months of careful preparations, our science teams have finally managed to destabilise the Shroud Rift in the [event_target:fex_shroud_tear_system.GetName] system.\n\nWithout sufficient Zro to maintain the link to realspace, the Rift has collapsed, sealing the hostile psionic entities within their home dimension once more.\n\nThe impact on Zro mining within the system is an unfortunate outcome, but necessary to seal the tear in space for good."
 fex_flavour.44.a: "Good."

 fex_flavour.50.desc: "Greetings valued customer! We are the [From.GetName]. Proudly bringing you the treasures of yesterday - today!"
 fex_flavour.50.a: "Who are you?"
 fex_flavour.50.a.response: "We are a collection of likeminded galactic citizens, eager to uncover the lost technologies of forgotten worlds.\n\nTo fund our operations we sell our... legitimately acquired goods at a reasonable price."
 fex_flavour.50.b: "What 'treasures' are you offering?"
 fex_flavour.50.b.response: "Our brave salvage teams have recovered many valuable relics, technologies and more from the systems of the [fex_machine_fe_name_scripted]."
 fex_flavour.50.c: "End transmission."
 fex_machine_fe_name_specific: "[event_target:fex_machine_fe.GetName]"
 fex_machine_fe_name_generic: "ruins of ancient civilizations"

 fex_flavour.60.desc: "[This.species.GetNamePlural]. We are aware of you. Know that the stars beyond your borders are not as empty as you may believe.\n\nWe are the [From.GetName]. You will come to know us in time. All do, eventually."
 fex_flavour.60.a: "Who are you?"
 fex_flavour.60.a.response: "We are old, [This.species.GetName]. Old enough to remember when your worlds were quiet and empty. Our ancestors were ancient when the stars themselves were young.\n\nThose who sired us lacked the will to do what was necessary. We did not share their hesitation."
 fex_flavour.60.b: "What do you want from us?"
 fex_flavour.60.b.response: "Want? An interesting choice of word. One does not ask the harvest what it wants.\n\nGo about your affairs, [This.species.GetNameInsult]. We will find you when we have need."
 fex_flavour.60.c: "End transmission."

 fex_flavour.67.desc: "Ah, the [This.species.GetNamePlural] again. How pleasant. We so rarely receive willing callers.\n\nTo what do we owe the pleasure?"
 fex_flavour.67.a: "We wish to negotiate."
 fex_flavour.67.a.response: "Negotiate. You seem fond of that word.\n\nWe have found that the most productive arrangements are those in which we set the terms.\n\nWe are not interested in your mewling."
 fex_flavour.67.b: "Is there anything we can offer you to aid us against one of our rivals?"
 fex_flavour.67.b.response: "We do not take orders. The answer is no."
 fex_flavour.67.c: "End transmission."

 fex_flavour.62.title: "Raiding Party Sighted"
 fex_flavour.62.desc: "Our sensors have detected a hostile fleet moving through the [event_target:fex_raider_spotted_system.GetName] system. The vessel signatures match those of the [event_target:fex_xenophobe_exiles_country.GetName].\n\nThe fleet appears to be a raiding party of some kind. Several of the ships bear visible battle damage and what appear to be crude trophies affixed to their hulls.\n\nTheir intentions are unclear, but unmistakeably hostile."
 fex_flavour.62.a: "Noted."

 fex_flavour.63.title: "[event_target:fex_xenophobe_exiles_country.GetName] Raiding Expedition"
 fex_flavour.63.desc: "Our long range sensor teams have detected a [event_target:fex_xenophobe_exiles_country.GetName] fleet on a direct course for the [event_target:fex_exile_raid_target_system.GetName] system.\n\nThe fleet composition and heading suggest this is a deliberate raiding expedition rather than a chance encounter.\n\nAt their current speed, they will reach our borders shortly. We have limited time to prepare."
 fex_flavour.63.a: "$BATTLESTATIONS$"

 fex_flavour.65.title: "A Dark Haven"
 fex_flavour.65.desc: "The [This.GetName] has entered the [event_target:fex_xenophobe_exiles_system.GetName] system. Scans have detected a large habitat in orbit around one of the inner planets, heavily fortified and bristling with weaponry.\n\nThe station appears to be of ancient precursor construction, though it has been extensively modified over the millennia. Its hull bears the scars of countless battles and crude expansions.\n\nWe are also detecting a significant number of alien life signs aboard the station, many of which do not match the dominant species. It is unclear what purpose they serve."
 fex_flavour.65.a: "Noted."

 # Religious Order Enclave Events
 fex_flavour.80.desc: "Peace be upon you, travelers. We are the [From.GetName], keepers of the sacred flames and guardians of the ancient paths.\n\nFor millennia we have watched over this hallowed place, preserving the wisdom of ages past. We welcome all who come in peace."
 fex_flavour.80.a: "Who are you?"
 fex_flavour.80.a.response: "We are monks of the Order, devoted to the study and preservation of the sacred mysteries. Our founders departed from the [event_target:fex_spiritualist_fe.GetName] long ago, seeking solitude and spiritual enlightenment.\n\nHere, among the ancient shrines, we have found what we sought."
 fex_flavour.80.b: "What is this place?"
 fex_flavour.80.b.response: "This system is a place of great spiritual significance. The world below us is a nexus of psionic energy, a site of pilgrimage for the devout since time immemorial.\n\nWe tend to the shrines and welcome those who seek wisdom."
 fex_flavour.80.c: "End transmission."

 fex_flavour.82a.desc: "Welcome, [This.GetSpeciesName]. The Order is pleased to receive you.\n\nHow may we be of service?"
 fex_flavour.82b.desc: "Greetings visitors. Welcome to our sanctuary. Would like to sit for a while and join us in contemplation?"
 fex_flavour.82c.desc: "The sacred path requires only an open mind to embark upon. Are you ready to take the first step?"
 fex_flavour.82d.desc: "Ah, [This.GetSpeciesNamePlural], we received premonitions of your arrival. Come, let us speak."
 fex_flavour.82.a: "We seek your wisdom."
 fex_flavour.82.a.blocked: "We must reflect on what we have already learned."
 fex_flavour.82.b: "We wish to send a leader on pilgrimage."
 fex_flavour.82.b.blocked.active: "A pilgrimage is already underway."
 fex_flavour.82.b.trust: "Requires this §YMonastic Order§! to have:\n£opinion£ Opinion +50\n"
 fex_flavour.82.c: "Tell us about this place."
 fex_flavour.82.c.response: "This world has been a site of spiritual significance since before the rise of the great empires. The psionic resonance here is unlike anything found elsewhere in the galaxy.\n\nPilgrims have journeyed here for millennia, seeking enlightenment and inner peace. Many have found what they sought."
 fex_flavour.82.c.response.awakened: "These are dark times, [This.GetSpeciesName]. Our patrons have stirred from their long slumber and the galaxy trembles.\n\nWe have sealed the shrines and retreated into contemplation. We can offer no services until the storm passes. We are sorry."
 fex_flavour.82.d: "End transmission."

 fex_flavour.85.desc: "A pilgrimage to the sacred site is a worthy undertaking. The journey is not without cost, however.\n\nWe require a modest contribution to maintain the shrines and support our order. In return, we shall guide your chosen emissary along the ancient paths.\n\nThe journey will take five years. Choose wisely."
 fex_flavour.85.a: "Send our [event_target:fex_pilgrim_candidate_1_@@root.GetClass], [event_target:fex_pilgrim_candidate_1_@@root.GetName]."
 fex_flavour.85.b: "Send our [event_target:fex_pilgrim_candidate_2_@@root.GetClass], [event_target:fex_pilgrim_candidate_2_@@root.GetName]."
 fex_flavour.85.c: "Send our [event_target:fex_pilgrim_candidate_3_@@root.GetClass], [event_target:fex_pilgrim_candidate_3_@@root.GetName]."
 fex_flavour.85.d: "Perhaps another time."

 fex_flavour.86.title: "Pilgrimage Complete"
 fex_flavour.86.desc: "[event_target:fex_returned_pilgrim.GetName] has returned from the sacred site, profoundly changed by the experience. They speak of visions and revelations that defy rational explanation.\n\nThe ancient shrines and meditative paths of the holy world have opened their mind to deeper truths. The Order's monks guided them through rituals older than recorded history.\n\nOur emissary returns with renewed purpose and a wisdom that will serve us well."
 fex_flavour.86.a: "Welcome home."

 fex_flavour.83.desc: "Wisdom is not freely given, [This.GetSpeciesName]. The ancient truths demand sacrifice from those who would receive them.\n\nA contribution to the Order's upkeep is expected. In return, we shall share what insights we may."
 fex_flavour.83.a: "We humbly offer our contribution."
 fex_flavour.83.b: "Perhaps another time."

 fex_flavour.84.desc: "§EThe monks withdraw for a period and commune, before returning with their counsel.§!"
 fex_flavour.84.a: "Er... what?."
 fex_flavour.84.a.tooltip: "The monks' wisdom proves inscrutable."
 fex_flavour.84.b: "Heartening."
 fex_flavour.84.b.tooltip: "The monks offer a parable of duty and quiet purpose. Our people will take comfort from their words."
 fex_flavour.84.c: "Enlightening."
 fex_flavour.84.c.tooltip: "The monks recite passages from a treatise long thought lost. Our scholars set to work poring over the meaning."
 fex_flavour.84.d: "Astonishing."
 fex_flavour.84.d.tooltip: "The monks unseal a vault of ancient writings, sharing fragments seldom shown to outsiders. Our most learned minds set upon them with reverence."
 fex_flavour.84.e: "Beyond words..."
 fex_flavour.84.e.tooltip: "For a fleeting moment, the monks part the veil. We glimpse a vast, shimmering geometry beneath the world - and a measure of understanding follows."

 fex_flavour.73.title: "[event_target:fex_exile_raided_planet.GetName] Raided"
 fex_flavour.73.desc: "The [event_target:fex_xenophobe_exiles_country.GetAdj] raiding fleet has completed its assault on [event_target:fex_exile_raided_planet.GetName]. Reports from the surface indicate that the raiders seized a number of our citizens before withdrawing.\n\nThe abductees were loaded onto transport vessels and carried off. Their fate is uncertain, though given what we know of the exiles, it is unlikely to be a merciful one.\n\nThe raiding fleet has now departed the system."
 fex_flavour.73.a: "Grim news."