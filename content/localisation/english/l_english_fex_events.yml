l_english:
 fex_flavour.10.title: "Anachronistic Aliens"
 fex_flavour.10.desc: "The pre-FTL civilization on [From.GetName] appears to possess far more sophisticated technology than a species of their level should have.\n\nAdditionally, our scans do not detect any signs of major urban settlements across the world, only minor outposts. It is not clear how they could have developed such advanced technology.\n\nThey appear to be aware of our presence and are attempting to communicate with us."
 fex_flavour.10.a: "On screens."

 fex_flavour.11.desc: "[This.species.GetNamePlural]. This is our world. Leave us undisturbed and we shall do the same."
 fex_flavour.11.a: "Who are you?"
 fex_flavour.11.a.response: "We are ancient. Our forefathers came to this world long before yours had raised themselves from the muck. Here we may pursue our paths in peace."
 fex_flavour.11.b: "How do you have such advanced technology?"
 fex_flavour.11.b.response: "We developed it of course."
 fex_flavour.11.c: "What do you want from us?"
 fex_flavour.11.c.response: "Nothing. [FromFrom.GetName] is our home. It provides for all our wants. Leave our world untouched and you may do as you please with the resources of this system."
 fex_flavour.11.d: "End transmission."

 fex_flavour.13.desc: "Insolent [This.GetSpeciesNamePluralInsult]. How dare you sully this world's sanctity and assault our cousins? Withdraw immediately or face our wrath."
 fex_flavour.13.a: "We will withdraw immediately."
 fex_flavour.13.a.tooltip: "Our colony on [event_target:fex_invaded_exodite_planet.GetName] will be abandoned."
 fex_flavour.13.b: "We will not take orders from you."
 fex_flavour.13.b.tooltip: "§H[event_target:fex_xenophile_fe.GetName]§! will be very angry, and are likely to attack us."

 # Note, try to write references to the FEs in a way that doesn't break the text too badly if there's no event target.
 fex_flavour.30.title: "A Spectacular Find"
 fex_flavour.30.desc: "Our dig team on [This.GetName] have been successful beyond anyone's wildest dreams. The burial chamber is extraordinarily well preserved.\n\nIt appears that our team may be the first sentients to enter the tomb since it was sealed. The sheer volume of artifacts found within has exciting implications for our understanding of the period of [event_target:fex_burial_origin_country.GetAdj] history that they originate from."
 fex_flavour.30.a: "Wonderful."

 fex_flavour.31.title: "[This.GetName] Excavations"
 fex_flavour.31.desc: "Our archaeological team on [This.GetName] reports good news. Their efforts to excavate an ancient [event_target:fex_burial_origin_country.GetAdj] tomb has been successful.\n\nAlthough some of the outer chambers have been damaged by raiders or the passage of time, the inner chambers are largely intact and contain many of their original contents.\n\nThe treasures and technology held within are of great interest to the [this.owner.GetAdj] scientific community."
 fex_flavour.31.a: "Excellent."

 fex_flavour.32.title: "Digsite Blues"
 fex_flavour.32.desc: "We have successfully managed to excavate the burial complex on [This.GetName]. Unfortunately it appears that our team is not the first to do so.\n\nPirates, raiders or perhaps the descendants of those buried inside seem to have forced their way into the tomb and recovered many of the treasures held within.\n\nThe tomb itself is still of great interest to our scientists and we have been able to salvage some artifacts, but the bulk of the burial goods appear to be gone for good."
 fex_flavour.32.a: "Unfortunate."

 fex_flavour.33.title: "Fruitless Endeavours"
 fex_flavour.33.desc: "We do not seem to be the first to have explored the tombs of [This.GetName]. The complex bears the marks of having been entered several times, centuries apart. The treasure rooms and burial chambers have been meticulously picked clean.\n\nAlthough we can develop our understanding of the [event_target:fex_burial_origin_country.GetAdj] culture that buried their dead here by examining the markings of the tomb, we have missed out on obtaining any of the artifacts that may have once been buried here."
 fex_flavour.33.a: "Disappointing."

 fex_flavour.41.title: "Voidspawn Incursion"
 fex_flavour.41.desc: "Sensor readings report that hostile entities have emerged from the Shroud Rift in [event_target:fex_shroud_tear_system.GetName]!\n\nThey appear to be drawn to the high concentrations of Zro on several worlds in the system and are indiscriminately attacking all vessels in the area."
 fex_flavour.41.a: "$BATTLESTATIONS$"

 fex_flavour.42.title: "Unwelcome Visitors"
 fex_flavour.42.desc: "The [event_target:fex_shroud_tear_system.GetName] system has come under attack by some sort of extradimensional entities that emerged from the system's rift.\n\nAlthough the entities have been dispelled, some spacetime anomalies and odd sensor readings remain.\n\nWe have an opportunity to investigate further and learn more about these creatures."
 fex_flavour.42.a: "Make it so."

 fex_flavour.43.title: "Peeking Beyond the Veil"
 fex_flavour.43.desc: "The malevolent shroud entities encountered in [event_target:fex_shroud_tear_system.GetName] appear to be the latest in a long line of incursions. As far as our scientists can tell, periodic manifestations have been occurring since the formation of the Shroud Rift.\n\nIt seems that the entities are attracted by the substantial quantities of Zro deposited on various worlds across the system by the Rift.\n\nIf we could seal the Rift, we would stop the entities' incursions, but the replenishment of the Zro on the worlds of the system would cease and production would diminish."
 fex_flavour.43.a: "Fascinating."

 fex_flavour.44.title: "Sealing the Rift"
 fex_flavour.44.desc: "After months of careful preparations, our science teams have finally managed to destabilise the Shroud Rift in the [event_target:fex_shroud_tear_system.GetName] system.\n\nWithout sufficient Zro to maintain the link to realspace, the Rift has collapsed, sealing the hostile psionic entities within their home dimension once more.\n\nThe impact on Zro mining within the system is an unfortunate outcome, but necessary to seal the tear in space for good."
 fex_flavour.44.a: "Good."

 fex_flavour.50.desc: "Greetings valued customer! We are the [From.GetName]. Proudly bringing you the treasures of yesterday - today!"
 fex_flavour.50.a: "Who are you?"
 fex_flavour.50.a.response: "We are a collection of likeminded galactic citizens, eager to uncover the lost technologies of forgotten worlds.\n\nTo fund our operations we sell our... legitimately acquired goods at a reasonable price."
 fex_flavour.50.b: "What 'treasures' are you offering?"
 fex_flavour.50.b.response: "Our brave salvage teams have recovered many valuable relics, technologies and more from the systems of the [fex_machine_fe_name_scripted]."
 fex_flavour.50.c: "End transmission."
 fex_machine_fe_name_specific: "[event_target:fex_machine_fe.GetName]"
 fex_machine_fe_name_generic: "ruins of ancient civilizations"