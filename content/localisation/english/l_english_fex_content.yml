l_english:
 # Deposits
 d_fex_forgotten_archives: "Forgotten Archives"
 d_fex_forgotten_archives_desc: "The accumulated wisdom of countless ages, languishing in obscurity."
 d_fex_ruined_monuments: "Decaying Monuments"
 d_fex_ruined_monuments_desc: "Mighty deeds commemorated long ago. None now remembered."
 d_fex_ruined_wastes_blocker: "£blocker£ Ruined Wastes"
 d_fex_ruined_wastes_blocker_desc: "Swathes of land, devoid of any life. The terrain is covered in scars from exotic weapons. Approach is treacherous."
 d_fex_ancient_ai_core: "Ancient AI Core"
 d_fex_ancient_ai_core_desc: "An immensely powerful AI, shackled deep within a fortified facility. It is difficult to tell just how old it is."
 d_fex_shattered_ai_core: "Shattered AI Core"
 d_fex_shattered_ai_core_desc: "The remains of an ancient superintelligence. The ruins have been left for nature to reclaim."
 d_fex_leviathan_preserves: "Leviathan Preserves"
 d_fex_leviathan_preserves_desc: "Large swathes of the planet's ecosystems are dominated by enormous lifeforms. They do not appear to be native to this world."
 d_fex_ancient_citadels: "Ancient Citadels"
 d_fex_ancient_citadels_desc: "The ravages of time have done little to dull the potent strength of these fortifications and the warriors housed within."
 d_fex_crypt_monument: "Crypt Monuments"
 d_fex_crypt_monument_desc: "Faded and weathered structures commemorate the burial of long-dead heroes."
 d_fex_ancient_barrows: "Ancient Barrows"
 d_fex_ancient_barrows_desc: "Ravaged by time, these ancient structures contain the remains of forgotten notables and their precious treasures."
 d_fex_imperial_tombs: "Imperial Tomb Complex"
 d_fex_imperial_tombs_desc: "Immense crumbling architecture attests to the power and wealth of the ancient rulers interred within."
 d_fex_ancient_gene_vault: "Ancient Gene Vault"
 d_fex_ancient_gene_vault_desc: "This ruined facility appears to have once held a genetic repository containing many samples of alien life. Its degradation seems to have released many of its samples into the planet's environment."
 d_fex_ruined_fe_cities: "Ruined Cities"
 d_fex_ruined_fe_cities_desc: "The broken remains of ancient towns and cities, eroded to near dust by the passage of eons."

 # Planet Modifiers
 fex_xenophobe_titanic_game: "Titanic Game"
 fex_xenophobe_titanic_game_desc: "Enormous lifeforms, raised and hunted for sport."

 fex_materialist_ai_world: "Ancilla World"
 fex_materialist_ai_world_desc: "This planet houses a number of ancient artificial intelligences. Despite their age, many are still functional."

 fex_spiritualist_shrine_world: "Shrine World"
 fex_spiritualist_shrine_world_desc: "This world is dotted with ancient shrines that offer reverence to holy deities and spirits."

 fex_martial_order: "Martial Orders"
 fex_martial_order_desc: "This planet has hosted mighty legions of valiant warriors for centuries. Their proud history is present on every part of this world."

 fex_mausoleum_world: "Mausoleum World"
 fex_mausoleum_world_desc: "This world hosts dozens of tombs, cairns and burial sites for notable figures from a Fallen Empire. The historic record stretches back millennia."

 fex_fe_terraforming: "Precursor World"
 fex_fe_terraforming_desc: "This world has been carefully shaped by an ancient and technologically advanced civilization. Every rock, plant and animal has its proper place."

 fex_fe_terraforming_ringworld: "Precursor Ring Segment"
 fex_fe_terraforming_ringworld_desc: "The biosphere of this ring is a careful work of art, shaped by ancient crafts. Every feature is deliberate."

 fex_fe_terraforming_ecu: "Precursor Ecumenopolis"
 fex_fe_terraforming_ecu_desc: "This world is a peerless monument to the long history and advanced technologies of the civilization that built it. It is filled with sophisticated precursor artifacts and ancient structures."

 # We put this one on fe relic worlds too
 fex_decayed_fe_terraforming: "Ancient Terraforming"
 fex_decayed_fe_terraforming_desc: "This world's biosphere appears to have once been carefully sculpted by a precursor civilization. The deliberate order has given way to chaotic growth."

 fex_fe_exodite_terraforming: "Vibrant Life"
 fex_fe_exodite_terraforming_desc: "This world is perfectly suited to hosting life. Its thriving ecosystems are almost unnaturally robust. This could be the result of meddling by a forerunner civilization."

 fex_overgrown_world: "Overgrown World"
 fex_overgrown_world_desc: "The flora of this world is unnaturally quick to grow, smothering all surfaces and taking mere days to grow from nothing to a considerable size."

 fex_buried_relic_world: "Buried Ruins"
 fex_buried_relic_world_desc: "[fex_buried_relic_scripted] of this world, the remains of enormous ancient cities can be found, decayed and worn by the passage of time."
 fex_buried_relic_wet: "Deep within the jungles"
 fex_buried_relic_dry: "Buried beneath the shifting sands"
 fex_buried_relic_cold: "Smothered beneath the ice and snow"
 fex_buried_relic_default: "Buried across the landscape"

 fex_fe_burial_grounds: "Ancient Burial Grounds"
 fex_fe_burial_grounds_desc: "This planet hosts a number of ancient tombs and burial complexes belonging to an ancient alien race."

 fex_fe_ancient_bombardment: "Ancient Bombardment"
 fex_fe_ancient_bombardment_desc: "This world is covered in the faded scars of a massive orbital bombardment. The ground is unstable and pockmarked by the eroded remains of ancient craters."

 # Jobs
 job_fex_xeno_game: "Alien Quarry"
 job_fex_xeno_game_plural: "$job_fex_xeno_game$"
 job_fex_xeno_game_desc: "The most dangerous game."
 mod_job_fex_xeno_game_add: "$job_fex_xeno_game$ Jobs"

 job_fex_xeno_hunter: "Xeno-Hunter"
 job_fex_xeno_hunter_plural: "Xeno-Hunters"
 job_fex_xeno_hunter_desc: "For these precursors the thrill of the hunt exceeds even the most sophisticated luxuries available on their homeworlds."
 mod_job_fex_xeno_hunter_add: "$job_fex_xeno_hunter$ Jobs"

 job_fex_exodite_druid: "Path of the Druid"
 job_fex_exodite_druid_plural: "Path of the Druid"
 job_fex_exodite_druid_desc: "In the quiet paths among the idle groves wisdom may be found."
 mod_job_fex_exodite_druid_add: "$job_fex_exodite_druid$ Jobs"

 job_fex_exodite_smith: "Path of the Smith"
 job_fex_exodite_smith_plural: "Path of the Smith"
 job_fex_exodite_smith_desc: "Through the simple forging of crafts we shape the world around us."
 mod_job_fex_exodite_smith_add: "$job_fex_exodite_smith$ Jobs"

 job_fex_exodite_hunter: "Path of the Hunter"
 job_fex_exodite_hunter_plural: "Path of the Hunter"
 job_fex_exodite_hunter_desc: "And so we give thanks to the beast that is slain, that we may honor its passing."
 mod_job_fex_exodite_hunter_add: "$job_fex_exodite_hunter$ Jobs"

 job_fex_monk: "Monk"
 job_fex_monk_plural: "Monks"
 job_fex_monk_desc: "A lifetime of quiet contemplation can uncover many deeper truths."
 mod_job_fex_monk_add: "$job_fex_monk$ Jobs"

 job_fex_promethean_warrior: "Promethean Warrior"
 job_fex_promethean_warrior_plural: "Promethean Warriors"
 job_fex_promethean_warrior_desc: "Peerless warriors charged with protecting the empire and preserving their own ancient tradition."
 mod_job_fex_promethean_warrior_add: "$job_fex_promethean_warrior$ Jobs"

 job_fex_arena_slave: "Arena Slave"
 job_fex_arena_slave_plural: "Arena Slaves"
 job_fex_arena_slave_desc: "The baying crowd calls for blood."
 mod_job_fex_arena_slave_add: "$job_fex_arena_slave$ Jobs"

 job_fex_blood_serf: "Blood Serf"
 job_fex_blood_serf_plural: "Blood Serfs"
 job_fex_blood_serf_desc: "Unfortunate souls trapped in bondage. Forced to toil for meagre rations."
 mod_job_fex_blood_serf_add: "$job_fex_blood_serf$ Jobs"

 job_fex_exile_archon: "Archon"
 job_fex_exile_archon_plural: "Archons"
 job_fex_exile_archon_desc: "The ruling caste of a precursor society. Their hierarchy is precarious and ever-shifting."
 mod_job_fex_exile_archon_add: "$job_fex_exile_archon$ Jobs"

 job_fex_exile_chirurgeon: "Chirurgeon"
 job_fex_exile_chirurgeon_plural: "Chirurgeons"
 job_fex_exile_chirurgeon_desc: "Equal parts sage and scientist, these individuals wield ancient bio-arts to preserve and shape their charges."
 mod_job_fex_exile_chirurgeon_add: "$job_fex_exile_chirurgeon$ Jobs"

 job_fex_exile_overseer: "Taskmaster"
 job_fex_exile_overseer_plural: "Taskmasters"
 job_fex_exile_overseer_desc: "A strong hand is necessary to keep the menials in line."
 mod_job_fex_exile_overseer_add: "$job_fex_exile_overseer$ Jobs"

 job_fex_exile_priest: "Purity Priest"
 job_fex_exile_priest_plural: "Purity Priests"
 job_fex_exile_priest_desc: "These priests conduct cruel rituals to assert their species' divine superiority over all lesser, primitive beings"
 mod_job_fex_exile_priest_add: "$job_fex_exile_priest$ Jobs"

 # Buildings
 building_fex_hunting_lodges: "Hunting Lodges"
 building_fex_hunting_lodges_desc: "An anachronistic throwback to a more primitive age. Prospective thrill seekers are accommodated in sparse but comfortable conditions."

 building_fex_runestones: "Elder Runestones"
 building_fex_runestones_desc: "Ancient stones hum with esoteric power."

 building_fex_exodite_settlements: "Exodite Settlements"
 building_fex_exodite_settlements_desc: "Scattered settlements artfully incorporating the natural world are the only signs of civilization on this planet."

 building_fex_scientific_outposts: "Scientific Outposts"
 building_fex_scientific_outposts_desc: "An isolated facility far from civilization. Home to inscrutable experiments and advanced technologies."

 building_fex_ancient_shrines: "Ancient Shrines"
 building_fex_ancient_shrines_desc: "Simple structures that honor deities half-forgotten."

 building_fex_dark_palace: "Dark Palace"
 building_fex_dark_palace_desc: "Ancient black walls house unspeakable luxuries and indescribable marvels. Even the greatest of its neighbors are squalid in comparison."

 building_fex_slave_pens: "Slave Pens"
 building_fex_slave_pens_desc: "Cramped uncomfortable quarters for throngs of enslaved sentients."

 building_fex_blood_arena: "Blood Arena"
 building_fex_blood_arena_desc: "Lesser beings come here to die for the entertainment of their betters."

 building_fex_purity_temple: "Purity Temple"
 building_fex_purity_temple_desc: "A monument to the greatness of the chosen species. Sections of the aged structure house unbelievably advanced technology."


 # Decisions
 fex_tomb_raiding: "Excavate Burial Complex"
 fex_tomb_raiding_desc: "This world contains a number of ancient tombs constructed by an advanced alien civilization. We would benefit "
 fex_tomb_raiding_tt: "[fex_tomb_raiding_tt_scripted]"
 fex_tomb_raiding_tt_default: "Excavate a Fallen Empire tomb, potentially recovering valuable resources."
 fex_tomb_raiding_tt_advantage: "$fex_tomb_raiding_tt_default$\n\n§YWe are more likely to be successful on this world.§!"

 # Misc
 fex_exodite_age: "Exodite Age"
 fex_exodite_age_desc: "This civilization has a pre Industrial Age level of development. Despite this, they make use of several extremely sophisticated technologies. They appear to remain at their level of advancement by choice."
 col_fex_exodite_age: "Exodite World"
 col_fex_exodite_age_desc: "$col_primitive_desc$"
 col_fex_fe_frontier_world: "Fringe World"
 col_fex_fe_frontier_world_desc: "This world exists at the periphery of an incredibly advanced ancient empire."

 pop_cat_fex_exodus_precursor: "Exodus Precursor"
 pop_cat_fex_exodus_precursor_plural: "Exodus Precursors"
 pop_cat_fex_exodus_precursor_desc: "These individuals have consciously chosen to reject the decadent luxuries of their homeworlds in favor of leading a simpler life on the fringes of civilization."
 pop_cat_fex_exile_precursor: "Exile Precursor"
 pop_cat_fex_exile_precursor_plural: "Exile Precursors"
 pop_cat_fex_exile_precursor_desc: "Cast out from their home society millennia ago, those precursors revel in unchecked barbarism."
 pop_cat_fex_primitive_slave: "Primitive Slave"
 pop_cat_fex_primitive_slave_plural: "Primitive Slaves"
 pop_cat_fex_primitive_slave_desc: "Wretched masses cowering from their cruel masters."

