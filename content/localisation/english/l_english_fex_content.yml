 fex_civic_archaeotech_legacy: "Archaeotech Legacy"
 fex_civic_archaeotech_legacy_desc: "The powerful tools of a bygone age."
 fex_civic_blood_exiles: "Blood Exiles"
 fex_civic_blood_exiles_desc: "$empty_space_SC$"

 fex_exodite_army: "Exodite Rangers"
 fex_exodite_army_desc: "These Precursor Warriors possess a lethality that belies their archaic appearance."

 opinion_fex_attacked_exodites: "Attacked our Pre-FTL Cousins"

 fex_exile_hab_name: "Tyrant's Throne"
 fex_experiment_world_name: "The Crucible"
